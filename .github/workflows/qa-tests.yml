name: QA Tests (Docker Compose)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - qa-tests
      - qa-tests-runner-docker
  pull_request:
    branches:
      - master
      - qa-tests   

jobs:
  qa-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Docker Compose command
        run: |
          if docker compose version >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker compose" >> "$GITHUB_ENV"
          elif command -v docker-compose >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker-compose" >> "$GITHUB_ENV"
          else
            echo "Docker Compose not found on runner." >&2
            exit 1
          fi
      
      - name: Create .env file
        run: |
          cat <<EOF > .env
          AUTH_SECRET_KEY=${{ secrets.AUTH_SECRET_KEY }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          AUTH_DB_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/authdb
          JOB_STATUS_DB_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/jobstatusdb
          ITEMS_WRITE_DB_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/itemsdb
          ITEMS_READ_DB_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/itemsreaddb
          EOF    

      - name: Build and run QA tests
        run: |
          $COMPOSE_CMD up --build --abort-on-container-exit --exit-code-from qa-tests
            
      - name: Copy test results from container
        if: always()
        run: |
          mkdir -p test-results
          docker cp $(docker ps -aqf "name=qa-tests") \
            /workspace/qa-tests/target/karate-reports/. \
            test-results/ || echo "⚠️ Could not copy test results"

      - name: Upload Karate HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-test-report-${{ github.run_number }}
          path: test-results/
          retention-days: 30

      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Karate Test Results
          path: test-results/*.html
          reporter: java-junit
          fail-on-error: false    

      - name: Shutdown stack
        if: always()
        run: |
          $COMPOSE_CMD down -v
      - name: Cleanup .env
        if: always()
        run: rm -f .env
