name: QA Tests (Docker Compose)

on:
  push:
    branches:
      - master
      - qa-tests
      - qa-tests-runner-docker
  pull_request:
    branches:
      - master
      - qa-tests

jobs:
  qa-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Docker Compose command
        run: |
          if docker compose version >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker compose" >> "$GITHUB_ENV"
          elif command -v docker-compose >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker-compose" >> "$GITHUB_ENV"
          else
            echo "Docker Compose not found on runner." >&2
            exit 1
          fi
      
      - name: Create .env file
        run: |
          cat <<EOF > .env
          AUTH_SECRET_KEY=${{ secrets.AUTH_SECRET_KEY }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          AUTH_DB_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/authdb
          JOB_STATUS_DB_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/jobstatusdb
          ITEMS_WRITE_DB_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/itemsdb
          ITEMS_READ_DB_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/itemsreaddb
          EOF    

      - name: Build and run QA tests
        run: |
          $COMPOSE_CMD up --build --abort-on-container-exit --exit-code-from qa-tests

      - name: Shutdown stack
        if: always()
        run: |
          $COMPOSE_CMD down -v
      - name: Cleanup .env
        if: always()
        run: rm -f .env
